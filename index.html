<!DOCTYPE html>
<html>
<head>
    <title>Admin Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="admin-chat" style="width: 300px; border: 2px solid black; padding: 10px;">
        <h3>Admin Panel</h3>
        <div id="chat-list" style="height: 300px; overflow-y: scroll; background: #eee;"></div>
    </div>

    <script>
        const sb = supabase.createClient("https://egrurdztqvmtuomlbbep.supabase.co", "sb_publishable_I41YLESY4BLD2xnAU52vJA_kCh9k-tj");
        const list = document.getElementById('chat-list');

        // Fetch
        sb.from("messages").select("*").then(({data}) => {
            if(data) list.innerHTML = data.map(m => `<div>${m.text}</div>`).join('');
        });

        // Realtime
        sb.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
            list.innerHTML += `<div>${payload.new.text}</div>`;
        }).subscribe();
    </script>
</body>
</html>
