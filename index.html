<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Admin Chat - Main</h1>
    <div id="chat-list"></div>

    <script>
        // SIGURADUHIN NA ITO ANG EKSAKTONG URL AT KEY
        const supabaseUrl = 'https://egrurdztqvmtuomlbbep.supabase.co';
        const supabaseKey = 'sb_publishable_I41YLESY4BLD2xnAU52vJA_kCh9k-tj';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);

        const list = document.getElementById('chat-list');

        // 1. Initial Load (kunin lahat ng messages)
        async function getMessages() {
            const { data, error } = await sb.from('messages').select('*').order('id', { ascending: true });
            if (error) { console.error("Error fetching:", error); }
            else {
                list.innerHTML = data.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join('');
            }
        }

        // 2. Realtime Listener
        sb.channel('any')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
              console.log('Change received!', payload);
              const m = payload.new;
              list.innerHTML += `<div><b>${m.sender}:</b> ${m.text}</div>`;
          })
          .subscribe((status) => {
              console.log("Subscription status:", status);
          });

        getMessages();
    </script>
</body>
</html>
