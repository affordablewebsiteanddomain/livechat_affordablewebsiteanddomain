<!DOCTYPE html>
<html>
<head>
    <title>Admin Chat Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 250px; border-right: 1px solid #ccc; padding: 10px; overflow-y: auto; background: #f4f4f4; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #logs { flex: 1; padding: 20px; overflow-y: auto; background: #fff; }
        #input-area { padding: 20px; border-top: 1px solid #ccc; display: flex; }
        .user-btn { display: block; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; background: white; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Customers</h3>
        <div id="customer-list"></div>
    </div>

    <div id="chat-area">
        <div id="logs"></div>
        <div id="input-area">
            <input id="admin-in" style="flex:1;" placeholder="Reply as Admin...">
            <button onclick="sendReply()">Send</button>
        </div>
    </div>

<script>
    // 1. Initialize Supabase (Global Variable)
    const sb = supabase.createClient("https://egrurdztqvmtuomlbbep.supabase.co", "sb_publishable_I41YLESY4BLD2xnAU52vJA_kCh9k-tj");
    let activeUser = null;

    // 2. I-load ang mga unique customers
    async function loadCustomers() {
        const { data, error } = await sb.from("messages").select("sender").neq("sender", "Admin");
        if (error) { console.error("Error loading customers:", error); return; }
        
        const unique = [...new Set(data.map(m => m.sender))];
        const listDiv = document.getElementById("customer-list");
        listDiv.innerHTML = "";
        unique.forEach(user => {
            const btn = document.createElement("button");
            btn.className = "user-btn";
            btn.innerText = user;
            btn.onclick = () => { activeUser = user; loadChat(user); };
            listDiv.appendChild(btn);
        });
    }

    // 3. I-load ang chat ng napiling customer
    function loadChat(user) {
        document.getElementById("logs").innerHTML = "";
        sb.from("messages").select("*").or(`sender.eq.${user},sender.eq.Admin`)
          .order("created_at", {ascending: true}).then(res => {
            if (res.data) {
                res.data.forEach(m => {
                    document.getElementById("logs").innerHTML += `<div><b>${m.sender}:</b> ${m.text}</div>`;
                });
            }
        });
    }

    // 4. Admin Reply
    async function sendReply() {
        if(!activeUser) return alert("Pumili muna ng customer sa kaliwa!");
        const text = document.getElementById("admin-in").value;
        await sb.from("messages").insert([{text, sender: "Admin", room_id: activeUser}]);
        document.getElementById("admin-in").value = "";
    }

    // Auto-update
    sb.channel("any").on("postgres_changes", {event: "INSERT", schema: "public", table: "messages"}, () => {
        if(activeUser) loadChat(activeUser);
        loadCustomers();
    }).subscribe();

    // Start
    loadCustomers();
</script>
</body>
</html>
