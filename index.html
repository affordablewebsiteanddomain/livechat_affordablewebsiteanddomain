<!DOCTYPE html>
<html>
<head>
    <title>Admin Chat Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* DITO ANG STYLE NG CHAT BOX */
        body { font-family: sans-serif; background: #e9ecef; padding: 20px; }
        #chat-window { 
            max-width: 500px; margin: auto; background: white; 
            border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            overflow: hidden; display: flex; flex-direction: column; height: 80vh; 
        }
        #header { background: #007bff; color: white; padding: 15px; font-weight: bold; }
        #chat-list { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { padding: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="chat-window">
    <div id="header">Live Chat Admin</div>
    <div id="chat-list">Naglo-load...</div>
</div>

<script>
    const sb = supabase.createClient("https://egrurdztqvmtuomlbbep.supabase.co", "sb_publishable_I41YLESY4BLD2xnAU52vJA_kCh9k-tj");
    const chatList = document.getElementById('chat-list');

    // Load initial
    async function init() {
        const { data } = await sb.from("messages").select("*").order("id", { ascending: true });
        chatList.innerHTML = data.map(m => `<div class="msg"><b>${m.sender}:</b> ${m.text}</div>`).join('');
    }

    // Realtime
    sb.channel("any")
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, payload => {
          chatList.innerHTML += `<div class="msg"><b>${payload.new.sender}:</b> ${payload.new.text}</div>`;
          chatList.scrollTop = chatList.scrollHeight;
      }).subscribe();

    init();
</script>
</body>
</html>
