<!DOCTYPE html>
<html>
<head>
    <title>Admin Chat Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        #chat-container { width: 350px; background: white; border: 2px solid #333; padding: 15px; border-radius: 8px; }
        #chat-list { height: 300px; overflow-y: scroll; background: #eee; margin-bottom: 10px; padding: 5px; }
        #admin-controls { display: flex; gap: 5px; }
        input { flex: 1; }
    </style>
</head>
<body>

<div id="chat-container">
    <h3>Admin Chat</h3>
    <div id="chat-list"></div>
    <div id="admin-controls">
        <input type="text" id="admin-input" placeholder="Type reply...">
        <button onclick="sendReply()">Send</button>
    </div>
</div>

<script>
    const sb = supabase.createClient("https://egrurdztqvmtuomlbbep.supabase.co", "sb_publishable_I41YLESY4BLD2xnAU52vJA_kCh9k-tj");
    const list = document.getElementById('chat-list');

    // Load messages
    sb.from("messages").select("*").order("id", { ascending: true }).then(({data}) => {
        if(data) list.innerHTML = data.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join('');
    });

    // Send reply function
    async function sendReply() {
        const input = document.getElementById('admin-input');
        await sb.from("messages").insert([{ text: input.value, sender: "admin", room_id: "main" }]);
        input.value = "";
    }

    // Realtime
    sb.channel('any').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        list.innerHTML += `<div><b>${payload.new.sender}:</b> ${payload.new.text}</div>`;
        list.scrollTop = list.scrollHeight;
    }).subscribe();
</script>
</body>
</html>
