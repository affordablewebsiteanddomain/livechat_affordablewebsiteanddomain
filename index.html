<div style="display: flex; height: 100vh;">
    <div id="sidebar" style="width: 250px; border-right: 1px solid #ccc; overflow-y: auto;">
        <h3>Customers</h3>
        <div id="customer-list"></div>
    </div>

    <div style="flex: 1; display: flex; flex-direction: column;">
        <div id="chat-logs" style="flex: 1; padding: 20px;"></div>
        <div style="padding: 20px;">
            <input id="admin-input" style="width: 80%;">
            <button onclick="replyToUser()">Reply</button>
        </div>
    </div>
</div>

<script>
    let activeRoom = null;

    // 1. I-load ang listahan ng mga unique na sender
    sb.from("messages").select("sender").then(data => {
        const uniqueSenders = [...new Set(data.data.map(m => m.sender))];
        uniqueSenders.forEach(sender => {
            const btn = document.createElement("button");
            btn.innerText = sender;
            btn.onclick = () => { activeRoom = sender; loadChat(sender); };
            document.getElementById("customer-list").appendChild(btn);
        });
    });

    // 2. I-load ang chat ng napiling customer
    function loadChat(sender) {
        sb.from("messages").select("*").eq("sender", sender).then(res => {
            document.getElementById("chat-logs").innerHTML = res.data.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join("");
        });
    }

    // 3. Mag-reply sa specific na customer
    async function replyToUser() {
        const text = document.getElementById("admin-input").value;
        await sb.from("messages").insert([{ text, sender: "Admin", room_id: activeRoom }]);
    }
</script>
