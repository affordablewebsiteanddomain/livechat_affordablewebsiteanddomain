<!DOCTYPE html>
<html>
<head>
    <title>Admin Chat Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 300px; border-right: 1px solid #ccc; padding: 10px; overflow-y: auto; background: #f4f4f4; }
        #chat-area { flex: 1; display: flex; flex-direction: column; }
        #logs { flex: 1; padding: 20px; overflow-y: auto; background: #fff; }
        #input-area { padding: 20px; border-top: 1px solid #ccc; display: flex; }
        .user-btn { display: block; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; background: white; border: 1px solid #ddd; text-align: left; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>Customers</h3>
        <div id="customer-list"></div>
    </div>

    <div id="chat-area">
        <div id="logs"></div>
        <div id="input-area">
            <input id="admin-in" style="flex:1;" placeholder="Reply to selected customer...">
            <button onclick="sendReply()">Send</button>
        </div>
    </div>

<script>
    const sb = supabase.createClient("https://egrurdztqvmtuomlbbep.supabase.co", "sb_publishable_I41YLESY4BLD2xnAU52vJA_kCh9k-tj");
    let activeRoom = null;

    // 1. I-load ang mga unique na customers
    async function loadCustomers() {
        const { data } = await sb.from("messages").select("room_id");
        if (!data) return;
        const uniqueRooms = [...new Set(data.map(m => m.room_id))];
        const listDiv = document.getElementById("customer-list");
        listDiv.innerHTML = "";
        uniqueRooms.forEach(room => {
            const btn = document.createElement("button");
            btn.className = "user-btn";
            btn.innerText = room;
            btn.onclick = () => { activeRoom = room; loadChat(room); };
            listDiv.appendChild(btn);
        });
    }

    // 2. I-load ang chat base sa room_id (Dito ang filter!)
    function loadChat(room) {
        document.getElementById("logs").innerHTML = "";
        sb.from("messages").select("*").eq("room_id", room).order("created_at", {ascending: true})
          .then(res => {
            if (res.data) {
                res.data.forEach(m => {
                    document.getElementById("logs").innerHTML += `<div><b>${m.sender}:</b> ${m.text}</div>`;
                });
            }
        });
    }

    // 3. Admin Reply (Dapat naka-room_id)
    async function sendReply() {
        if(!activeRoom) return alert("Pumili muna ng customer sa kaliwa!");
        const text = document.getElementById("admin-in").value;
        await sb.from("messages").insert([{text, sender: "Admin", room_id: activeRoom}]);
        document.getElementById("admin-in").value = "";
    }

    // Auto-update (Dito ang filter para hindi magulo)
    sb.channel("admin-channel").on("postgres_changes", {event: "INSERT", schema: "public", table: "messages"}, payload => {
        if(activeRoom && payload.new.room_id === activeRoom) {
            document.getElementById('logs').innerHTML += `<div><b>${payload.new.sender}:</b> ${payload.new.text}</div>`;
        }
        loadCustomers();
    }).subscribe();

    loadCustomers();
</script>
</body>
</html>
