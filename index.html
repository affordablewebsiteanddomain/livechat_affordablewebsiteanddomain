<!DOCTYPE html>
<html>
<head>
    <title>Admin Chat Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #e9ecef; display: flex; justify-content: center; padding: 20px; }
        #chat-window { width: 400px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; height: 500px; }
        #header { background: #007bff; color: white; padding: 15px; font-weight: bold; }
        #chat-list { flex: 1; overflow-y: auto; padding: 15px; border-bottom: 1px solid #eee; }
        #reply-area { padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-window">
    <div id="header">Live Chat Admin</div>
    <div id="chat-list"></div>
    <div id="reply-area">
        <input type="text" id="admin-input" placeholder="Type a reply...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const sb = supabase.createClient("https://egrurdztqvmtuomlbbep.supabase.co", "sb_publishable_I41YLESY4BLD2xnAU52vJA_kCh9k-tj");
    const chatList = document.getElementById('chat-list');

    // Load messages
    async function load() {
        const { data } = await sb.from("messages").select("*").order("id", { ascending: true });
        chatList.innerHTML = data.map(m => `<div><b>${m.sender}:</b> ${m.text}</div>`).join('');
    }

    // Send reply
    async function sendMessage() {
        const input = document.getElementById('admin-input');
        if (!input.value) return;
        await sb.from("messages").insert([{ text: input.value, sender: "admin", room_id: "main" }]);
        input.value = "";
    }

    // Realtime
    sb.channel("any").on("postgres_changes", { event: "INSERT", schema: "public", table: "messages" }, payload => {
        chatList.innerHTML += `<div><b>${payload.new.sender}:</b> ${payload.new.text}</div>`;
        chatList.scrollTop = chatList.scrollHeight;
    }).subscribe();

    load();
</script>
</body>
</html>
